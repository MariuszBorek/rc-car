<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Camera Stream</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html, body { margin: 0; height: 100%; background: black; font-family: Arial, sans-serif; overflow: hidden; }
    .container { position: relative; width: 100%; height: 100%; }
    img { width: 100vw; height: 100vh; object-fit: contain; background: black; }
    .status { position: absolute; bottom: 20px; left: 20px; font-size: 12px; color: #0f0; transition: opacity 0.3s; }
    .status.error { color: red; }
</style>
</head>
<body>
<div class="container" id="container">
    <img id="stream"/>
    <div id="status" class="status">Connecting...</div>
</div>

<script>
const stream = document.getElementById("stream");
const status = document.getElementById("status");

let retryDelay = 2000;

function getStreamUrl() {
    return `/video?t=${Date.now()}`;
}

function startStream() {
    status.textContent = "Connecting...";
    status.classList.remove("error");
    stream.src = getStreamUrl();
}

// Auto-reconnect przy błędzie
stream.onerror = function () {
    status.textContent = "Disconnected. Reconnecting...";
    status.classList.add("error");
    setTimeout(() => { startStream(); }, retryDelay);
};

// Restart co 30s (stabilność MJPEG)
setInterval(() => { startStream(); }, 30000);

// Start stream
startStream();
</script>
</body>
</html>
